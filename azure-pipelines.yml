trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

# =========================
# VALIDATION
# =========================
- stage: Validation
  displayName: Validation
  jobs:
  - job: Validation
    steps:
    - script: echo "Validating Enterprise DevSecOps Platform"
      displayName: Validation

# =========================
# TESTING
# =========================
- stage: Testing
  displayName: Testing
  dependsOn: Validation
  jobs:
  - job: Pytest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pytest app/test_app.py
      displayName: Run Pytest

# =========================
# SONARCLOUD ANALYSIS
# =========================
- stage: SonarCloud_Analysis
  displayName: SonarCloud Analysis
  dependsOn: Testing
  jobs:
  - job: Sonar
    steps:

    - task: SonarCloudPrepare@4
      inputs:
        SonarCloud: 'sonarcloud-sc'
        organization: 'zeeshanahmad12'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'zeeshanahmad12_azure-enterprise-devsecops-platform'
        cliProjectName: 'azure-enterprise-devsecops-platform'
        cliSources: '.'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
      displayName: Install Dependencies

    - task: SonarCloudAnalyze@4

    - task: SonarCloudPublish@4
      inputs:
        pollingTimeoutSec: '300'

# =========================
# CODE QUALITY
# =========================
- stage: Code_Quality
  displayName: Code Quality
  dependsOn: SonarCloud_Analysis
  jobs:
  - job: Pylint
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        pip install -r app/requirements.txt
        pylint app/app.py --disable=all --enable=E
      displayName: Run Pylint

# =========================
# SECURITY SCAN (BANDIT)
# =========================
- stage: Security_Scan
  displayName: Security Scan
  dependsOn: Code_Quality
  jobs:
  - job: Bandit
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        pip install -r app/requirements.txt
        bandit -r app -x app/test_app.py
      displayName: Run Bandit

# =========================
# CHECKOV (NEW ADD ONLY)
# =========================
- stage: Checkov_Scan
  displayName: Checkov Terraform Scan
  dependsOn: Security_Scan
  jobs:
  - job: Checkov
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        pip install checkov
        checkov -d terraform
      displayName: Run Checkov Scan

# =========================
# KUBERNETES VALIDATION
# =========================
- stage: Kubernetes_Validation
  displayName: Kubernetes Validation
  dependsOn: Checkov_Scan
  jobs:
  - job: AKSValidation
    steps:
    - script: |
        echo "Validating Kubernetes manifests..."
        ls -la k8s
      displayName: Validate Kubernetes Manifests

# =========================
# DOCKER BUILD & PUSH
# =========================
- stage: Docker_Build_Push
  displayName: Docker Build and Push
  dependsOn: Kubernetes_Validation
  jobs:
  - job: Docker
    steps:

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        containerRegistry: 'acr-enterprise-devsecops-sc'
        repository: 'devsecops-app'
        dockerfile: 'app/Dockerfile'
        buildContext: 'app'
        tags: |
          latest
          $(Build.BuildId)

# =========================
# TRIVY SCAN
# =========================
- stage: Trivy_Image_Scan
  displayName: Trivy Image Scan
  dependsOn: Docker_Build_Push
  jobs:
  - job: Trivy
    steps:

    - script: |
        sudo apt-get update
        sudo apt-get install -y wget

        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

        trivy image --severity HIGH,CRITICAL acrenterprise7861.azurecr.io/devsecops-app:latest
      displayName: Run Trivy Scan

# =========================
# DEPLOY TO AKS
# =========================
- stage: Deploy_to_AKS
  displayName: Deploy to AKS
  dependsOn: Trivy_Image_Scan
  jobs:
  - job: Deploy
    steps:

    - task: KubernetesManifest@1
      displayName: Deploy Deployment
      inputs:
        action: deploy
        kubernetesServiceConnection: 'aks-enterprise-devsecops-sc'
        manifests: |
          k8s/deployment.yaml

    - task: KubernetesManifest@1
      displayName: Deploy Service
      inputs:
        action: deploy
        kubernetesServiceConnection: 'aks-enterprise-devsecops-sc'
        manifests: |
          k8s/service.yaml
