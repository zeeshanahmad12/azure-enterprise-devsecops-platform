trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

- stage: Validation
  displayName: Validation
  jobs:
  - job: Validation
    steps:
    - script: echo "Validating Enterprise DevSecOps Platform"
      displayName: Validation

- stage: Testing
  displayName: Testing
  dependsOn: Validation
  jobs:
  - job: Pytest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pytest app/test_app.py
      displayName: Run Pytest

# =========================
# 🔥 SONARCLOUD (UPDATED WITH YOUR KEYS)
# =========================
- stage: SonarCloud_Analysis
  displayName: SonarCloud Analysis
  dependsOn: Testing
  jobs:
  - job: Sonar
    steps:

    - task: SonarCloudPrepare@1
      inputs:
        SonarCloud: 'sonarcloud-sc'
        organization: 'zeeshanahmad12'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'zeeshanahmad12_azure-enterprise-devsecops-platform'
        cliProjectName: 'azure-enterprise-devsecops-platform'
        cliSources: '.'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install pylint
        pylint app/app.py --fail-under=5
      displayName: Run Static Analysis

    - task: SonarCloudAnalyze@1

    - task: SonarCloudPublish@1
      inputs:
        pollingTimeoutSec: '300'

# =========================
# Code Quality
# =========================
- stage: Code_Quality
  displayName: Code Quality
  dependsOn: SonarCloud_Analysis
  jobs:
  - job: Pylint
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pylint app/app.py --disable=all --enable=E
      displayName: Run Pylint

# =========================
# Security Scan
# =========================
- stage: Security_Scan
  displayName: Security Scan
  dependsOn: Code_Quality
  jobs:
  - job: Bandit
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        bandit -r app -x app/test_app.py
      displayName: Run Bandit

# =========================
# Kubernetes Validation
# =========================
- stage: Kubernetes_Validation
  displayName: Kubernetes Validation
  dependsOn: Security_Scan
  jobs:
  - job: AKSValidation
    steps:
    - script: |
        echo "Validating Kubernetes manifests..."
        ls -la k8s
      displayName: Validate Kubernetes Manifests

# =========================
# Docker Build & Push
# =========================
- stage: Docker_Build_Push
  displayName: Docker Build and Push
  dependsOn: Kubernetes_Validation
  jobs:
  - job: Docker
    steps:

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        containerRegistry: 'acr-enterprise-devsecops-sc'
        repository: 'devsecops-app'
        dockerfile: 'app/Dockerfile'
        buildContext: 'app'
        tags: |
          latest
          $(Build.BuildId)

# =========================
# Trivy Scan
# =========================
- stage: Trivy_Image_Scan
  displayName: Trivy Image Scan
  dependsOn: Docker_Build_Push
  jobs:
  - job: Trivy
    steps:

    - task: Docker@2
      displayName: Login to Azure Container Registry
      inputs:
        command: login
        containerRegistry: 'acr-enterprise-devsecops-sc'

    - script: |
        sudo apt-get update
        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
        trivy --version
        trivy image --severity HIGH,CRITICAL acrenterprise7861.azurecr.io/devsecops-app:latest
      displayName: Run Trivy Scan

# =========================
# Deploy to AKS
# =========================
- stage: Deploy_to_AKS
  displayName: Deploy to AKS
  dependsOn: Trivy_Image_Scan
  jobs:
  - job: Deploy
    steps:

    - task: KubernetesManifest@1
      displayName: Deploy Deployment
      inputs:
        action: deploy
        kubernetesServiceConnection: 'aks-enterprise-devsecops-sc'
        manifests: |
          k8s/deployment.yaml

    - task: KubernetesManifest@1
      displayName: Deploy Service
      inputs:
        action: deploy
        kubernetesServiceConnection: 'aks-enterprise-devsecops-sc'
        manifests: |
          k8s/service.yaml
