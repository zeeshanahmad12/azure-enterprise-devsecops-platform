trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

- stage: Validation
  jobs:
  - job: Validation
    steps:
    - script: echo "Validating Enterprise DevSecOps Platform"
      displayName: "Validation"

- stage: Testing
  dependsOn: Validation
  jobs:
  - job: Pytest
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'

    - script: |
        pip install -r app/requirements.txt
        pytest app/test_app.py
      displayName: "Run Pytest Tests"

- stage: Kubernetes_Validation
  dependsOn: Testing
  jobs:
  - job: AKSValidation
    steps:
    - script: |
        echo "AKS Deployment Manifest Found"
        ls -la k8s
      displayName: "Validate Kubernetes Manifests"

- stage: Deploy_to_AKS
  dependsOn: Kubernetes_Validation
  jobs:
  - job: Deploy
    steps:

    - task: KubernetesManifest@1
      displayName: Deploy Deployment
      inputs:
        action: deploy
        kubernetesServiceConnection: aks-enterprise-devsecops-sc
        manifests: |
          k8s/deployment.yaml

    - task: KubernetesManifest@1
      displayName: Deploy Service
      inputs:
        action: deploy
        kubernetesServiceConnection: aks-enterprise-devsecops-sc
        manifests: |
          k8s/service.yaml
